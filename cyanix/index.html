<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyanix AI — Your AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Background -->
<div class="bg-grid"></div>

<!-- ── Header ─────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <div class="brand">
      <span class="brand-cy">Cyan</span><span class="brand-ix">ix</span>
      <span class="brand-tag">AI</span>
    </div>
    <span class="status-chip">
      <span class="status-dot"></span>Online
    </span>
  </div>
  <div class="topbar-right">
    <a href="../cysearch/index.html" class="nav-link">◉ Cysearch Map</a>
    <button class="btn-clear" id="clear-btn">Clear chat</button>
  </div>
</header>

<!-- ── Layout ─────────────────────────────────── -->
<main class="layout">

  <!-- Chat -->
  <section class="chat-section">

    <div class="messages" id="messages">
      <!-- Messages injected by JS -->
    </div>

    <!-- Typing indicator -->
    <div class="typing-row hidden" id="typing">
      <div class="avatar ai-avatar">✦</div>
      <div class="typing-bubbles">
        <span></span><span></span><span></span>
      </div>
      <span class="typing-label" id="typing-label">Thinking...</span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-box" id="input-box">
        <textarea
          id="chat-input"
          class="chat-input"
          rows="1"
          placeholder="Ask me anything..."
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button class="send-btn" id="send-btn" title="Send message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-meta">
        <span class="input-hint">Enter to send · Shift+Enter for new line</span>
        <span class="cs-status" id="cysearch-indicator">
          <span class="cs-dot"></span> Cysearch connected
        </span>
      </div>
    </div>

  </section>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Search Results</span>
      <span class="sidebar-sub">Powered by Cysearch</span>
    </div>
    <div class="nodes-list" id="nodes-list">
      <div class="nodes-empty">
        <div class="empty-icon">◉</div>
        <p class="empty-text">When I search the web for you, results will show up here as clickable cards.</p>
      </div>
    </div>
    <div class="sidebar-foot">
      <a href="../cysearch/index.html" class="btn-galaxy">Open Galaxy Map →</a>
    </div>
  </aside>

</main>

<script src="JavaScript.js"></script>
</body>
</html>
