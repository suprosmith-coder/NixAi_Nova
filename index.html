<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cysearch — Galaxy Internet Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     SCREEN 1 — GALAXY
═══════════════════════════════════════════ -->
<div id="screen-galaxy">
  <canvas id="galaxy-canvas"></canvas>

  <!-- Top bar -->
  <header class="gx-header">
    <div class="gx-logo">
      <span class="logo-cy">CY</span><span class="logo-search">SEARCH</span>
    </div>
    <nav class="gx-nav">
      <a href="#" class="gx-nav-link" id="cyanix-link">CYANIX AI ↗</a>
    </nav>
  </header>

  <!-- Hero -->
  <div class="gx-hero">
    <p class="gx-tag">INTERNET GALAXY MAP</p>
    <h1 class="gx-title">EXPLORE THE<br/><span class="gx-title-accent">DIGITAL UNIVERSE</span></h1>
    <p class="gx-sub">
      <span id="counter">0</span> nodes mapped across
      <span class="gx-highlight">8 clusters</span>
    </p>
    <button class="gx-enter-btn" id="enter-btn">ENTER THE GALAXY</button>
  </div>

  <!-- Layer controls -->
  <div class="gx-layers">
    <span class="layer-label">DEPTH</span>
    <button class="layer-btn active" data-layer="1">L1</button>
    <button class="layer-btn" data-layer="2">L2</button>
    <button class="layer-btn" data-layer="3">L3</button>
    <button class="layer-btn" data-layer="4">L4</button>
  </div>

  <!-- Legend -->
  <div class="gx-legend">
    <div class="legend-title">CLUSTERS</div>
    <div id="legend-items"></div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tt hidden">
    <div class="tt-row">
      <span id="tt-cluster" class="tt-cluster"></span>
    </div>
    <div id="tt-name" class="tt-name"></div>
    <div id="tt-url" class="tt-url"></div>
  </div>

  <!-- Lock-on panel -->
  <div id="lockon-panel" class="lockon" style="display:none;">
    <div class="lo-corner lo-corner-tl"></div>
    <div class="lo-corner lo-corner-tr"></div>
    <div class="lo-corner lo-corner-bl"></div>
    <div class="lo-corner lo-corner-br"></div>
    <div id="lo-ring" class="lo-ring"></div>
    <div id="lo-dot"  class="lo-dot"></div>
    <div class="lo-content">
      <div id="lo-cluster" class="lo-cluster"></div>
      <div id="lo-name"    class="lo-name"></div>
      <div id="lo-url"     class="lo-url"></div>
      <div id="lo-desc"    class="lo-desc"></div>
      <button id="lo-launch" class="lo-launch">LAUNCH SITE ↗</button>
    </div>
  </div>

  <!-- Scanlines overlay -->
  <div class="scanlines"></div>
</div>


<!-- ═══════════════════════════════════════════
     SCREEN 2 — COBWEB / SEARCH
═══════════════════════════════════════════ -->
<div id="screen-cobweb" style="display:none;">
  <canvas id="bg-canvas"></canvas>

  <svg id="cobweb-svg">
    <defs>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <g id="links-g"></g>
    <g id="nodes-g"></g>
  </svg>

  <!-- Top bar -->
  <header class="cw-header">
    <div class="gx-logo">
      <span class="logo-cy">CY</span><span class="logo-search">SEARCH</span>
    </div>
    <div class="cw-user">
      <span id="user-label" class="user-label">EXPLORER</span>
      <button id="signout-btn" class="signout-btn">SIGN OUT</button>
    </div>
  </header>

  <!-- Search bar -->
  <div class="cw-search-bar" id="search-wrap">
    <div class="search-input-row">
      <input id="search-input" class="search-input" type="text" placeholder="SEARCH THE GALAXY..." autocomplete="off" spellcheck="false" />
      <button id="search-btn" class="search-btn">SCAN</button>
      <button id="reset-btn" class="reset-btn">✕</button>
    </div>
    <div class="qtags-row">
      <button class="qtag" data-q="AI tools">AI TOOLS</button>
      <button class="qtag" data-q="web development">WEB DEV</button>
      <button class="qtag" data-q="design resources">DESIGN</button>
      <button class="qtag" data-q="startup tools">STARTUPS</button>
      <button class="qtag" data-q="learn coding">CODING</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-wrap" class="loading-wrap" style="display:none;">
    <div class="loading-ring"></div>
    <div class="loading-text">SCANNING GALAXY...</div>
  </div>

  <!-- AI answer bar -->
  <div id="ai-bar" class="ai-bar" style="display:none;">
    <div class="ai-icon">◈</div>
    <div id="ai-text" class="ai-text"></div>
  </div>

  <!-- Node info panel -->
  <div id="node-info" class="node-info" style="display:none;">
    <button id="ni-close" class="ni-close">✕</button>
    <div id="ni-cat"  class="ni-cat"></div>
    <div id="ni-name" class="ni-name"></div>
    <div id="ni-desc" class="ni-desc"></div>
    <a  id="ni-link" class="ni-link" target="_blank" rel="noopener">VISIT SITE ↗</a>
  </div>

  <!-- Cyanix AI link -->
  <a href="../cyanix/index.html" class="cw-cyanix-link">ASK CYANIX AI ◈</a>
</div>


<!-- ═══════════════════════════════════════════
     AUTH OVERLAY
═══════════════════════════════════════════ -->
<div id="auth-overlay" class="auth-overlay hidden">
  <div class="auth-modal">
    <button id="auth-close" class="auth-close">✕</button>
    <div class="auth-logo">
      <span class="logo-cy">CY</span><span class="logo-search">SEARCH</span>
    </div>
    <p class="auth-tagline">ACCESS THE GALAXY</p>

    <!-- OAuth buttons -->
    <div class="oauth-row">
      <button id="ob-google"  class="oauth-btn google-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        GOOGLE
      </button>
      <button id="ob-github"  class="oauth-btn github-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GITHUB
      </button>
      <button id="ob-discord" class="oauth-btn discord-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.082.11 18.105.128 18.12a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        DISCORD
      </button>
    </div>

    <div class="auth-divider"><span>OR</span></div>

    <!-- Tabs -->
    <div class="atabs-row">
      <button class="atab active" data-tab="signin">SIGN IN</button>
      <button class="atab" data-tab="signup">SIGN UP</button>
    </div>

    <!-- Sign In -->
    <div id="tab-signin" class="aform active">
      <input  id="si-email" class="auth-input" type="email"    placeholder="EMAIL ADDRESS" />
      <input  id="si-pass"  class="auth-input" type="password" placeholder="PASSWORD" />
      <div    id="si-err"   class="auth-err hidden"></div>
      <button id="si-btn"   class="auth-submit">ACCESS MAP</button>
    </div>

    <!-- Sign Up -->
    <div id="tab-signup" class="aform">
      <input  id="su-email" class="auth-input" type="email"    placeholder="EMAIL ADDRESS" />
      <input  id="su-pass"  class="auth-input" type="password" placeholder="PASSWORD" />
      <input  id="su-conf"  class="auth-input" type="password" placeholder="CONFIRM PASSWORD" />
      <div    id="su-err"   class="auth-err hidden"></div>
      <div    id="su-ok"    class="auth-ok  hidden"></div>
      <button id="su-btn"   class="auth-submit">CREATE ACCOUNT</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="JavaScript.js"></script>
</body>
</html>
