<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cyanix AI - Setup</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;
         display:flex;align-items:center;justify-content:center;
         min-height:100vh;margin:0;padding:1rem;box-sizing:border-box}
    .card{max-width:440px;background:#1e293b;border-radius:16px;
          padding:2rem;border:1px solid #334155;text-align:center}
    h1{color:#38bdf8;margin-bottom:.5rem}
    code{background:#0f172a;padding:.2em .5em;border-radius:6px;color:#7dd3fc}
    p{color:#94a3b8;font-size:.9rem;line-height:1.6}
    .step{text-align:left;margin:.75rem 0;color:#cbd5e1;font-size:.88rem}
    .step b{color:#38bdf8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Cyanix AI</h1>
    <p>Server is running! Copy your Cyanix files into <code>www/</code> then refresh.</p>
    <div class="step"><b>1.</b> Copy <code>index.html</code>, <code>app.js</code>,
       <code>style.css</code> and all assets into the <code>www/</code> folder
       sitting next to <code>termux_server.py</code></div>
    <div class="step"><b>2.</b> Refresh this page</div>
    <p>Bridge API is live at <code>localhost:8765</code></p>
  </div>
</body>
</html>
